<div class="dashboard">
  <header class="dashboard-header">
      <nav class="menu">
          <ul>
              <li><a routerLink="marches">Recherche des Marchés</a></li>
              <li><a routerLink="en-cours-marche">Marchés En Cours</a></li>
              <li><a routerLink="nouveau-marche">Nouveau Marché</a></li>
              <li><a routerLink="appel-offre-marche">Appel d'Offre</a></li>
          </ul>
      </nav>
  </header>
  
  <div class="dashboard-content">
      <div class="march-container">
          <h2>Recherche des Marchés/Commandes</h2>
          <form class="march-form">
              <div class="form-group">
                  <label for="ref-marche">Réf Marché / Commande :</label>
                  <input type="text" id="ref-marche" placeholder="Réf Marché / Commande" />
              </div>
      
              <div class="form-group">
                  <label for="fournisseur">Fournisseur :</label>
                  <input type="text" id="fournisseur" placeholder="Fournisseur" />
              </div>
      
              <div class="form-group">
                  <label for="volume">Volume :</label>
                  <input type="text" id="volume" placeholder="Volume" />
              </div>
      
              <div class="form-group date-group">
                  <label>Date notification entre :</label>
                  <input type="date" />
                  <span>et</span>
                  <input type="date" />
              </div>
      
              <div class="form-group date-group">
                  <label>Date limite d'exécution entre :</label>
                  <input type="date" />
                  <span>et</span>
                  <input type="date" />
              </div>
      
              <div class="form-group">
                  <label for="situation">Situation :</label>
                  <select id="situation">
                      <option value="en-cours">En cours</option>
                      <option value="solde">Soldé</option>
                      <option value="annule">Annulée</option>
                  </select>
              </div>
      
              <div class="form-group">
                  <label for="type-marche">Type Marché / Commande :</label>
                  <select id="type-marche">
                      <option value="select-type">Select Type</option>
                      <option value="type1">Type 1</option>
                      <option value="type2">Type 2</option>
                  </select>
              </div>
      
              <button type="button" class="submit-button">Lancer la recherche</button>
          </form>
      </div>
  </div>
</div>
